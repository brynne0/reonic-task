services:
  db:
    image: postgres:16
    container_name: ev_sim_db
    environment:
      POSTGRES_USER: ev_sim
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ev_sim
    ports:
      - "5432:5432"
    networks:
      - ev_sim_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ev_sim"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ev_sim_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ev_sim:password@db:5432/ev_sim
      PORT: 3000
    networks:
      - ev_sim_network
    depends_on:
      db:
        condition: service_healthy

networks:
  ev_sim_network:
